<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Crawl Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0f1923; color: #e8ecf0; min-height: 100vh; }
    header { background: #1f4e79; padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 18px; font-weight: 600; }
    .live-dot { width: 10px; height: 10px; background: #1D9E75; border-radius: 50%; display: inline-block; margin-right: 6px; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 20px 28px; }
    .card { background: #1a2535; border: 1px solid #2a3a50; border-radius: 10px; padding: 18px 20px; }
    .card-label { font-size: 11px; color: #7a8fa6; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .card-value { font-size: 28px; font-weight: 700; color: #e8ecf0; }
    .card-sub { font-size: 12px; color: #7a8fa6; margin-top: 4px; }
    .card.green .card-value { color: #1D9E75; }
    .card.blue  .card-value { color: #378ADD; }
    .card.amber .card-value { color: #EF9F27; }
    .card.coral .card-value { color: #D85A30; }
    .section { padding: 0 28px 20px; }
    .section-title { font-size: 13px; color: #7a8fa6; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
    .worker-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
    .worker-card { background: #1a2535; border: 1px solid #2a3a50; border-radius: 8px; padding: 12px 14px; }
    .worker-rank { font-size: 11px; color: #7a8fa6; margin-bottom: 6px; }
    .worker-count { font-size: 20px; font-weight: 700; color: #378ADD; }
    .worker-status { font-size: 11px; margin-top: 4px; }
    .status-active { color: #1D9E75; }
    .status-dead   { color: #D85A30; }
    .bar-wrap { background: #0f1923; border-radius: 4px; height: 6px; margin-top: 8px; overflow: hidden; }
    .bar-fill { height: 100%; background: #378ADD; border-radius: 4px; transition: width 0.5s; }
    .log-box { background: #0f1923; border: 1px solid #2a3a50; border-radius: 8px; padding: 14px 16px; font-family: monospace; font-size: 12px; color: #9fb3c8; height: 160px; overflow-y: auto; margin: 0 28px 20px; }
    .log-line { margin-bottom: 3px; }
    .log-line.assign { color: #378ADD; }
    .log-line.receive { color: #1D9E75; }
    .log-line.fault  { color: #D85A30; }
    .progress-wrap { margin: 0 28px 20px; }
    .progress-bar { background: #1a2535; border-radius: 6px; height: 12px; overflow: hidden; border: 1px solid #2a3a50; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #1D9E75, #378ADD); transition: width 0.5s; border-radius: 6px; }
    .progress-label { font-size: 12px; color: #7a8fa6; margin-bottom: 6px; display: flex; justify-content: space-between; }
  </style>
</head>
<body>

<header>
  <h1><span class="live-dot"></span>PDC Distributed Crawler — Live Dashboard</h1>
  <span id="clock" style="font-size:13px;color:#7a8fa6"></span>
</header>

<div class="grid">
  <div class="card green">
    <div class="card-label">Pages crawled</div>
    <div class="card-value" id="pages">0</div>
    <div class="card-sub" id="target">of 1000 target</div>
  </div>
  <div class="card blue">
    <div class="card-label">Pages / second</div>
    <div class="card-value" id="pps">0.00</div>
    <div class="card-sub">throughput</div>
  </div>
  <div class="card amber">
    <div class="card-label">Queue size</div>
    <div class="card-value" id="queue">0</div>
    <div class="card-sub">URLs pending</div>
  </div>
  <div class="card coral">
    <div class="card-label">Elapsed time</div>
    <div class="card-value" id="elapsed">0s</div>
    <div class="card-sub" id="eta">ETA: calculating...</div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-label">
    <span>Crawl progress</span>
    <span id="pct">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="prog-fill" style="width:0%"></div>
  </div>
</div>

<div class="section">
  <div class="section-title">Worker status</div>
  <div class="worker-grid" id="worker-grid"></div>
</div>

<div class="section">
  <div class="section-title">Activity log</div>
</div>
<div class="log-box" id="log-box"></div>

<script>
const src = new EventSource("/stream");
const maxLog = 40;
let logs = [];

src.onmessage = e => {
  const d = JSON.parse(e.data);

  document.getElementById("pages").textContent   = d.pages_crawled ?? 0;
  document.getElementById("pps").textContent     = (d.pages_per_sec ?? 0).toFixed(2);
  document.getElementById("queue").textContent   = d.queue_size ?? 0;
  document.getElementById("elapsed").textContent = Math.round(d.elapsed ?? 0) + "s";

  const max = d.max_pages ?? 1000;
  const pct = Math.min(100, Math.round((d.pages_crawled / max) * 100));
  document.getElementById("pct").textContent      = pct + "%";
  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("target").textContent   = `of ${max} target`;

  const pps = d.pages_per_sec ?? 0;
  const rem = max - (d.pages_crawled ?? 0);
  const eta = pps > 0 ? Math.round(rem / pps) : null;
  document.getElementById("eta").textContent = eta ? `ETA: ~${eta}s` : "ETA: calculating...";

  // workers
  const wg = document.getElementById("worker-grid");
  wg.innerHTML = "";
  const workers = d.workers ?? {};
  const maxCount = Math.max(1, ...Object.values(workers).map(w => w.pages));
  for (const [rank, info] of Object.entries(workers)) {
    const dead = info.dead ?? false;
    const pct  = Math.round((info.pages / maxCount) * 100);
    wg.innerHTML += `
      <div class="worker-card">
        <div class="worker-rank">Rank ${rank}</div>
        <div class="worker-count">${info.pages}</div>
        <div class="worker-status ${dead ? "status-dead" : "status-active"}">
          ${dead ? "DEAD" : "active"}
        </div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>`;
  }

  // log
  if (d.last_event) {
    const cls = d.last_event.includes("->") ? "assign"
              : d.last_event.includes("<-") ? "receive"
              : d.last_event.includes("FAULT") ? "fault" : "";
    logs.unshift(`<div class="log-line ${cls}">${d.last_event}</div>`);
    if (logs.length > maxLog) logs.pop();
    document.getElementById("log-box").innerHTML = logs.join("");
  }
};

setInterval(() => {
  document.getElementById("clock").textContent = new Date().toLocaleTimeString();
}, 1000);
</script>
</body>
</html>
